<head>

  <style>
    .leaflet-container {
      height: 400px;
      width: 600px;
      max-width: 100%;
      max-height: 100%;
    }

.lds-ellipsis,
.lds-ellipsis div {
  box-sizing: border-box;
}
.lds-ellipsis {
  display: inline-block;
  position: relative;
  width: 80px;
  height: 80px;
}
.lds-ellipsis div {
  position: absolute;
  top: 33.33333px;
  width: 13.33333px;
  height: 13.33333px;
  border-radius: 50%;
  background: currentColor;
  animation-timing-function: cubic-bezier(0, 1, 1, 0);
}
.lds-ellipsis div:nth-child(1) {
  left: 8px;
  animation: lds-ellipsis1 0.6s infinite;
}
.lds-ellipsis div:nth-child(2) {
  left: 8px;
  animation: lds-ellipsis2 0.6s infinite;
}
.lds-ellipsis div:nth-child(3) {
  left: 32px;
  animation: lds-ellipsis2 0.6s infinite;
}
.lds-ellipsis div:nth-child(4) {
  left: 56px;
  animation: lds-ellipsis3 0.6s infinite;
}
@keyframes lds-ellipsis1 {
  0% {
    transform: scale(0);
  }
  100% {
    transform: scale(1);
  }
}
@keyframes lds-ellipsis3 {
  0% {
    transform: scale(1);
  }
  100% {
    transform: scale(0);
  }
}
@keyframes lds-ellipsis2 {
  0% {
    transform: translate(0, 0);
  }
  100% {
    transform: translate(24px, 0);
  }
}


  </style>
  <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify@4.16.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify@4.16.4/dist/tagify.polyfills.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
    integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"
    defer></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/js/bootstrap.min.js"
    integrity="sha384-oesi62hOLfzrys4LxRF63OJCXdXDipiYWBnvTl9Y9/TRlw5xlKIEHpNyvvDShgf/" crossorigin="anonymous"
    defer></script>
  <script language="javascript" id="_fed_an_ua_tag"
    src="https://dap.digitalgov.gov/Universal-Federated-Analytics-Min.js?agency=NASA&subagency=GSFC&dclink=true"

  <title>Harmony</title>
</head>

<body class="d-flex flex-column h-100">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-lg">
      <a class="navbar-brand nasa" href="/">Earthdata Harmony</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <div style="margin-left: 20px;">
    <form id="free-text-query-form" action="javascript:;" onsubmit="postForm( this );" class="pt-2">
      <textarea name="query" cols="40" rows="5" placeholder="enter free text query"></textarea>
      <br/>
      <input type="submit" value="submit" class="submitButton">
    </form>
    <br/>
    <div id="spinner" class="lds-ellipsis" style="display:none;">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
    <pre id="model-output"> </pre>
    <br/>
    <div id="map" style="width: 600px; height: 400px;"></div>
  </div>
  </body>

  <footer class="mt-auto">
    <div class="container-lg">
      <div class="row pt-3">
        <div class="col-md-8">
          <ul class="list-inline">
            <li class="list-inline-item">NASA Official: Stephen Berrick</li>
            <li class="list-inline-item"><a href="http://www.nasa.gov/FOIA/index.html">FOIA</a></li>
            <li class="list-inline-item"><a href="http://www.nasa.gov/about/highlights/HP_Privacy.html">NASA
                Privacy Policy</a></li>
            <li class="list-inline-item"><a href="http://www.usa.gov/">USA.gov</a></li>
            <li class="list-inline-item"><a href="#" onclick="javascript:feedback.showForm();">Feedback</a>
            </li>
          </ul>
        </div>
        <div class="col-md-4">
          <p class="text-right"><a href="/versions"><span class="badge bg-dark">v {{version}}</span></a></p>
        </div>
      </div>
    </div>
  </footer>
  <script>
    var map;
    var geoJsonLayer;

    async function postForm(form) {
      const spinner = document.getElementById('spinner');
      document.getElementById('model-output').innerHTML = '';
      if (geoJsonLayer) {
        geoJsonLayer.clearLayers();
      }
      spinner.style.display = 'block';
      const response = await fetch("./free-text", {
        method: "POST",
        body: JSON.stringify({
          query: form.query.value
        }),
        headers: {
          "Content-type": "application/json; charset=UTF-8"
        }
      });

      spinner.style.display = 'none';

      const json = await response.json();
      const geoJson = json.geoJson;
      const results = {
        propertyOfInterest: json.propertyOfInterest,
        placeOfInterest: json.placeOfInterest,
        buffer: `${json.bufferNumber} ${json.bufferUnits}`,
        collection: `${json.collection}`,
        variable: `${json.variable}`,
        temporalRange: `${json.timeInterval}`,
        outputFormat: `${json.outputFormat}`,
      }
      document.getElementById('model-output').innerHTML = JSON.stringify(results, null, 2);

      if (!map) {
        map = L.map('map').setView([51.505, -0.09], 1);

        const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);
      }


      geoJsonLayer = L.geoJSON(geoJson).addTo(map);
      map.fitBounds(geoJsonLayer.getBounds());

      return false;
    }

  </script>
  <script type="text/javascript" src="https://fbm.earthdata.nasa.gov/for/Harmony/feedback.js"></script>
  <script type="text/javascript">feedback.init({ showIcon: false });</script>
</body>

</html>
